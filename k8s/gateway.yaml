apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eth-indexer
  namespace: eth-indexer
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: "${GATEWAY_HOST}"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: eth-indexer
  namespace: eth-indexer
spec:
  parentRefs:
    - name: eth-indexer
  hostnames:
    - "${GATEWAY_HOST}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: api-server
          port: 80
    - matches:
         - path:
             type: PathPrefix
             value: /indexer
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: indexer
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: grafana
          port: 3000
