apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-connect
  namespace: eth-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-connect
  template:
    metadata:
      labels:
        app: kafka-connect
    spec:
      initContainers:
        # Wait for Kafka to be ready before starting
        - name: wait-for-kafka
          image: busybox
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done"]
      containers:
        - name: kafka-connect
          image: debezium/connect:2.6
          ports:
            - containerPort: 8083
          env:
            - name: BOOTSTRAP_SERVERS
              value: kafka:9093
            - name: GROUP_ID
              value: eth-indexer-connect
            - name: CONFIG_STORAGE_TOPIC
              value: connect-configs
            - name: OFFSET_STORAGE_TOPIC
              value: connect-offsets
            - name: STATUS_STORAGE_TOPIC
              value: connect-status
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-connect
  namespace: eth-indexer
spec:
  selector:
    app: kafka-connect
  ports:
    - port: 8083
      targetPort: 8083
