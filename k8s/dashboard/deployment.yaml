apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: eth-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done"]
      containers:
        - name: dashboard
          image: eth-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: SOURCE_TOPIC
              value: eth-indexer.public.event_records
            - name: UI_PORT
              value: "8090"
            - name: TOPICS
              value: "Transfer,Approval"
            - name: API_SERVER_URL
              value: "http://api-server"
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 10
