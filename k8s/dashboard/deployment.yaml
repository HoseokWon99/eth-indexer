apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: eth-indexer
spec:
  # Single replica — single consumer group member to preserve ordering
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done"]
      containers:
        - name: dashboard
          image: eth-dashboard:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: SOURCE_TOPIC
              value: eth-indexer.public.event_records
            - name: DEST_TOPIC_PREFIX
              value: eth-indexer.events
