apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: eth-indexer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      initContainers:
        - name: wait-for-database
          image: busybox
          command: ["sh", "-c", "until nc -z database 5432; do echo waiting for database; sleep 2; done"]
        - name: wait-for-valkey
          image: busybox
          command: ["sh", "-c", "until nc -z valkey 6379; do echo waiting for valkey; sleep 2; done"]
      containers:
        - name: api-server
          image: eth-api-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: API_PORT
              value: "8080"
            - name: API_TTL
              value: "60"
            - name: TOPICS
              value: "Transfer,Approval"
            - name: POSTGRES_HOST
              value: database
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              value: valkey
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-credentials
                  key: REDIS_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
