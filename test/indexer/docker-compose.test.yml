services:
  # Postgres - Test database
  postgres:
    image: postgres:16-alpine
    container_name: indexer-test-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5443:${POSTGRES_PORT}"
    networks:
      - indexer-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No volumes - fresh state on each run

  # Anvil - Local Ethereum node
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: indexer-test-anvil
    ports:
      - "${ANVIL_PORT}:8545"
    networks:
      - indexer-test
    healthcheck:
      test: [ "CMD", "cast", "client", "--rpc-url", "http://localhost:8545" ]
      interval: 2s
      timeout: 5s
      retries: 10
    entrypoint:
      - anvil
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "8545"
      - --block-time
      - "${ANVIL_BLOCK_TIME}"
      - --mnemonic
      - "${ANVIL_MNEMONIC}"

  # Indexer - container
  indexer:
    build:
      context: ../../
      dockerfile: ./services/indexer/Dockerfile
    container_name: test-indexer
    environment:
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL}
      INDEXER_CONTRACT_ADDRESSES: ${INDEXER_CONTRACT_ADDRESSES}
      INDEXER_ABI_PATH: ${INDEXER_ABI_PATH}
      INDEXER_EVENT_NAMES: ${INDEXER_EVENT_NAMES}
      INDEXER_CONFIRMED_AFTER: ${INDEXER_CONFIRMED_AFTER}
      INDEXER_OFFSET_BLOCK_NUMBER: ${INDEXER_OFFSET_BLOCK_NUMBER}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../../erc20-abi.test.json:/etc/eth-indexer/abi.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      anvil:
        condition: service_healthy
    networks:
      - indexer-test

networks:
  indexer-test:
    name: indexer-test
    driver: bridge
