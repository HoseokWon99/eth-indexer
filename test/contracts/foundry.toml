[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.20"
remappings = ["@openzeppelin/contracts/=node_modules/@openzeppelin/contracts"]

# RPC endpoints
[rpc_endpoints]
anvil = "http://localhost:8545"
anvil_docker = "http://anvil:8545"

# Test configuration
[profile.default.fuzz]
runs = 256

# See more indexer options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
