version: '3.8'

services:
  # Anvil - Local Ethereum node
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: eth-indexer-anvil
    command: >
      anvil
      --host=0.0.0.0
      --block-time=1
      --mnemonic="test test test test test test test test test test test junk"
    ports:
      - "8545:8545"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "cast", "client", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Postgres - Test database
  postgres:
    image: postgres:16-alpine
    container_name: eth-indexer-postgres-test
    environment:
      POSTGRES_DB: eth_indexer_test
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer_password
    ports:
      - "5434:5432"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d eth_indexer_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No volumes - fresh state on each run

  # Valkey - Test cache
  valkey:
    image: valkey/valkey:7-alpine
    container_name: eth-indexer-valkey-test
    ports:
      - "6380:6379"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No persistence - fresh state on each run

  # Contract Deployer - One-shot service
  contract-deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: eth-indexer-contract-deployer
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      RPC_URL: http://anvil:8545
    volumes:
      - ./test/contracts:/workspace
      - ./.scripts/anvil:/.scripts
      - ./deployed-addresses.json:/workspace/deployed-addresses.json
    working_dir: /workspace
    command: /.scripts/deploy-contracts.sh
    networks:
      - eth-indexer-test
    restart: "no"

  # Indexer - Service under test
  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eth-indexer-test
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      contract-deployer:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    volumes:
      - ./config/config.test.json:/etc/eth-indexer/config.json:ro
      - ./test-state:/var/lib/eth-indexer/test-state
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  eth-indexer-test:
    name: eth-indexer-test
    driver: bridge
