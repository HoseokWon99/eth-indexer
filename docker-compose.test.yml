services:
  # Anvil - Local Ethereum node
  anvil:
    build:
      context: .
      dockerfile: test/anvil/Dockerfile
    container_name: eth-indexer-test-anvil
    ports:
      - "8545:8545"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "cast", "client", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Postgres - Test database
  postgres:
    image: postgres:16-alpine
    container_name: eth-indexer-test-postgres
    environment:
      POSTGRES_DB: eth_indexer_test
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer_password
    ports:
      - "5434:5432"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d eth_indexer_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Valkey - Test cache
  valkey:
    image: valkey/valkey:7-alpine
    container_name: eth-indexer-test-valkey
    ports:
      - "6380:6379"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Contract Deployer - Deploy ERC20 test contracts (one-shot)
  # Addresses are deterministic from Anvil's default mnemonic:
  #   Token1 (TUSDC): 0x5FbDB2315678afecb367f032d93F642f64180aa3
  #   Token2 (TUSDT): 0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512
  contract-deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: eth-indexer-contract-deployer
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      RPC_URL: http://anvil:8545
      PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    volumes:
      - ./test/contracts:/workspace
    working_dir: /workspace
    command: >
      sh -c "forge script script/Deploy.s.sol:Deploy
        --rpc-url $$RPC_URL
        --broadcast
        --legacy
        -vv"
    networks:
      - eth-indexer-test
    restart: "no"

  # Event Generator - Emit 120 Transfer + 120 Approval events (one-shot)
  event-generator:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: eth-indexer-event-generator
    depends_on:
      contract-deployer:
        condition: service_completed_successfully
    environment:
      RPC_URL: http://anvil:8545
      TOKEN1_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      TOKEN2_ADDRESS: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      MNEMONIC: "test test test test test test test test test test test junk"
    volumes:
      - ./test/contracts:/workspace
    working_dir: /workspace
    command: >
      sh -c "forge script script/GenerateEvents.s.sol:GenerateEvents
        --rpc-url $$RPC_URL
        --broadcast
        --legacy
        -vv"
    networks:
      - eth-indexer-test
    restart: "no"

  # Indexer - Service under test
  # Reads all config from env vars; ABI loaded from mounted file.
  indexer:
    build:
      context: .
      dockerfile: services/indexer/Dockerfile
    container_name: eth-indexer-test-indexer
    depends_on:
      postgres:
        condition: service_healthy
      event-generator:
        condition: service_completed_successfully
    environment:
      ETHEREUM_RPC_URL: ws://anvil:8545
      INDEXER_CONTRACT_ADDRESSES: "0x5FbDB2315678afecb367f032d93F642f64180aa3,0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      INDEXER_ABI_PATH: /etc/eth-indexer/abi.json
      INDEXER_EVENT_NAMES: Transfer,Approval
      INDEXER_CONFIRMED_AFTER: "1"
      INDEXER_OFFSET_BLOCK_NUMBER: "0"
      INDEXER_STATUS_FILE_PATH: /var/lib/eth-indexer/test-state/status.json
      API_PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: eth_indexer_test
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer_password
    volumes:
      - ./config/abi.json:/etc/eth-indexer/abi.json:ro
      - indexer-state:/var/lib/eth-indexer/test-state
    ports:
      - "8081:8080"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  # API Server - Service under test
  # All config from env vars.
  api-server:
    build:
      context: .
      dockerfile: services/api-server/Dockerfile
    container_name: eth-indexer-test-api-server
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      API_PORT: "8081"
      API_TTL: "300"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: eth_indexer_test
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer_password
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      TOPICS: Transfer,Approval
    ports:
      - "8082:8081"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Test Runner - Jest E2E tests
  # Starts after indexer and api-server are healthy.
  test-runner:
    image: node:20-alpine
    container_name: eth-indexer-test-runner
    depends_on:
      indexer:
        condition: service_healthy
      api-server:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api-server:8081
      INDEXER_BASE_URL: http://indexer:8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: eth_indexer_test
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer_password
    volumes:
      - ./test:/app
    working_dir: /app/e2e
    command: sh -c "npm install && npm test"
    networks:
      - eth-indexer-test
    restart: "no"

volumes:
  indexer-state:

networks:
  eth-indexer-test:
    name: eth-indexer-test
    driver: bridge
