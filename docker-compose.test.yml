services:
  # Anvil - Local Ethereum node
  anvil:
    build:
      context: .
      dockerfile: test/anvil/Dockerfile
    container_name: eth-indexer-test-anvil
    ports:
      - "8545:8545"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "cast", "client", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 10
  # Postgres - Test database
  postgres:
    image: postgres:16-alpine
    container_name: eth-indexer-test-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d eth_indexer_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No volumes - fresh state on each run

  # Valkey - Test cache
  valkey:
    image: valkey/valkey:7-alpine
    container_name: eth-indexer-test-valkey
    ports:
      - "6380:6379"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No persistence - fresh state on each run

  # Contract Deployer - One-shot service
  contract-deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: eth-indexer-contract-deployer
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      RPC_URL: http://anvil:8545
    volumes:
      - ./test/contracts:/workspace
      - ./.scripts/anvil:/.scripts
      - ./deployed-addresses.json:/workspace/deployed-addresses.json
    working_dir: /workspace
    command: /.scripts/deploy-contracts.sh
    networks:
      - eth-indexer-test
    restart: "no"

  # Indexer - Service under test
  indexer:
    build:
      context: .
      dockerfile: services/indexer/Dockerfile
    container_name: eth-indexer-test-indexer
    depends_on:
      postgres:
        condition: service_healthy
      contract-deployer:
        condition: service_completed_successfully
    environment:
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL}
      INDEXER_CONTRACT_ADDRESSES: ${INDEXER_CONTRACT_ADDRESSES}
      INDEXER_ABI_PATH: ${INDEXER_ABI_PATH}
      INDEXER_EVENT_NAMES: ${INDEXER_EVENT_NAMES}
      INDEXER_CONFIRMED_AFTER: ${INDEXER_CONFIRMED_AFTER}
      INDEXER_OFFSET_BLOCK_NUMBER: ${INDEXER_OFFSET_BLOCK_NUMBER}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./config/config.test.json:/etc/eth-indexer/indexer-config.json:ro
      - ./test-state:/var/lib/eth-indexer/test-state
    ports:
      - "8081:8080"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  # API Server - Service under test
  api-server:
    build:
      context: .
      dockerfile: services/api-server/Dockerfile
    container_name: eth-indexer-test-api-server
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      API_PORT: ${API_PORT}
      API_TTL: ${API_TTL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      TOPICS: ${TOPICS}
    ports:
      - "8082:8081"
    networks:
      - eth-indexer-test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Test Runner - Jest E2E tests
  test-runner:
    image: node:20-alpine
    container_name: eth-indexer-test-runner
    depends_on:
      indexer:
        condition: service_healthy
      api-server:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api-server:8081
      INDEXER_BASE_URL: http://indexer:8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./test:/app
    working_dir: /app
    command: sh -c "npm install && npm test"
    networks:
      - eth-indexer-test
    restart: "no"

networks:
  eth-indexer-test:
    name: eth-indexer-test
    driver: bridge
