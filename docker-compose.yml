

services:
  postgres:
    image: postgres:16-alpine
    container_name: eth-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-eth_indexer}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - eth-indexer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
  valkey:
    image: valkey/valkey:7-alpine
    container_name: eth-valkey
    command: valkey-server --appendonly yes
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    networks:
      - eth-indexer
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Geth Ethereum node (optional - comment out if using external RPC like Infura)
  # WARNING: Full sync requires ~1TB disk space and significant time
  geth:
    image: ethereum/client-go:stable
    container_name: eth-geth
    command:
      - --syncmode=snap
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3
      - --http.corsdomain=*
      - --http.vhosts=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.api=eth,net,web3
      - --ws.origins=*
    ports:
      - "8545:8545"  # HTTP RPC
      - "8546:8546"  # WebSocket
      - "30303:30303"  # P2P
    volumes:
      - geth-data:/root/.ethereum
    networks:
      - eth-indexer
    restart: unless-stopped
  indexer:
    build: .
    container_name: eth-indexer
    env_file:
      - .env
    environment:
      - CONFIG_PATH=${CONFIG_PATH:-/etc/eth-indexer/config.json}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-eth_indexer}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - eth-indexer
    restart: unless-stopped
    volumes:
      - ./config.json:/etc/eth-indexer/config.json:ro
      - ./state:/var/lib/eth-indexer/state

networks:
  eth-indexer:
    driver: bridge

volumes:
  postgres-data:
  valkey-data:
  geth-data:
