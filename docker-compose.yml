

services:
  postgres:
    image: postgres:16-alpine
    container_name: eth-postgres
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-eth_indexer}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - eth-indexer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
  valkey:
    image: valkey/valkey:7-alpine
    container_name: eth-valkey
    command: valkey-server --appendonly yes
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    networks:
      - eth-indexer
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Geth Ethereum node (optional - comment out if using external RPC like Infura)
  # WARNING: Full sync requires ~1TB disk space and significant time
  geth:
    image: ethereum/client-go:stable
    container_name: eth-geth
    command:
      - --syncmode=snap
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,net,web3
      - --http.corsdomain=*
      - --http.vhosts=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.api=eth,net,web3
      - --ws.origins=*
    ports:
      - "8545:8545"  # HTTP RPC
      - "8546:8546"  # WebSocket
      - "30303:30303"  # P2P
    volumes:
      - geth-data:/root/.ethereum
    networks:
      - eth-indexer
    restart: unless-stopped
  indexer:
    build:
      context: .
      dockerfile: services/indexer/Dockerfile
    container_name: eth-indexer
    env_file:
      - .env
    environment:
      - CONFIG_PATH=${CONFIG_PATH:-/etc/eth-indexer/config.json}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eth-indexer
    restart: unless-stopped
    volumes:
      - ./config.indexer.json:/etc/eth-indexer/config.json:ro
      - ./state:/var/lib/eth-indexer/state

  api-server:
    build:
      context: .
      dockerfile: services/api-server/Dockerfile
    container_name: eth-api-server
    env_file:
      - .env
    environment:
      - CONFIG_PATH=${CONFIG_PATH:-/etc/eth-indexer/config.json}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - eth-indexer
    restart: unless-stopped
    volumes:
      - ./config.api-server.json:/etc/eth-indexer/config.json:ro

  kafka:
    image: apache/kafka:3.7.0
    container_name: eth-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - eth-indexer
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-connect:
    image: debezium/connect:2.6
    container_name: eth-kafka-connect
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: eth-indexer-connect
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - eth-indexer
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  debezium-init:
    image: debezium/connect:2.6
    container_name: eth-debezium-init
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-eth_indexer}
    volumes:
      - ./monitoring/debezium:/etc/debezium:ro
    entrypoint: ["/bin/sh", "/etc/debezium/register-connector.sh"]
    depends_on:
      kafka-connect:
        condition: service_healthy
    networks:
      - eth-indexer
    restart: on-failure

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    container_name: eth-dashboard
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SOURCE_TOPIC: eth-indexer.public.event_records
      UI_PORT: "8090"
      TOPICS: "Transfer,Approval"
      API_SERVER_URL: "http://api-server:8080"
    ports:
      - "${DASHBOARD_PORT:-8090}:8090"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - eth-indexer
    restart: unless-stopped

networks:
  eth-indexer:
    driver: bridge

volumes:
  postgres-data:
  valkey-data:
  geth-data:
  kafka-data:
