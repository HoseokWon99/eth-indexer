<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETH Indexer — Live Events</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0f1117; color: #e0e0e0; font-size: 13px; }
    header { padding: 12px 20px; background: #1a1d27; border-bottom: 1px solid #2a2d3e; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 15px; color: #a78bfa; }
    #status { font-size: 11px; color: #6b7280; }
    #status.connected { color: #34d399; }
    #status.error { color: #f87171; }
    nav { display: flex; gap: 0; padding: 0 20px; background: #1a1d27; border-bottom: 1px solid #2a2d3e; }
    .tab { padding: 8px 16px; cursor: pointer; color: #9ca3af; border-bottom: 2px solid transparent; }
    .tab.active { color: #a78bfa; border-bottom-color: #a78bfa; }
    .tab:hover { color: #e0e0e0; }
    #table-wrap { overflow-x: auto; padding: 0 20px 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th { text-align: left; padding: 6px 10px; color: #6b7280; border-bottom: 1px solid #2a2d3e; white-space: nowrap; }
    td { padding: 5px 10px; border-bottom: 1px solid #1e2130; vertical-align: top; }
    tr.new-row td { background: #0d2e1a; transition: background 2s ease; }
    .hash { color: #60a5fa; }
    .data-toggle { cursor: pointer; color: #a78bfa; text-decoration: underline; }
    .data-content { display: none; white-space: pre-wrap; word-break: break-all; color: #94a3b8; margin-top: 4px; }
    .data-content.open { display: block; }
    #empty { padding: 40px 20px; color: #4b5563; }
  </style>
</head>
<body>
  <header>
    <h1>ETH Indexer — Live Events</h1>
    <span id="status">connecting…</span>
  </header>
  <nav id="tabs"></nav>
  <div id="table-wrap">
    <div id="empty">Waiting for events…</div>
    <table id="events-table" style="display:none">
      <thead>
        <tr>
          <th>Time</th>
          <th>Block</th>
          <th>TxHash</th>
          <th>Contract</th>
          <th>Topic</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody id="events-body"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
